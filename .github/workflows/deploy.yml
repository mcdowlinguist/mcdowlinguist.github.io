name: Build and Deploy

on:
  push:
    branches:
      - source

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Ruby
      uses: actions/setup-ruby@v2
      with:
        ruby-version: 2.6.3

    - name: Checkout code
      uses: actions/checkout@v2

    - name: Before script
      run: chmod +x ./script/cibuild

    - name: Build script
      run: "./script/cibuild"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: _site
        keep_files: true
        commit_message: "Deploy to GitHub Pages"
